version: '3.8'
services:
  # PostgreSQL: The "Source of Truth" for player scores
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: leaderboard
    ports:
      - "5433:5432"

  # Redis: The "Fast Lane" for the real-time Top 10
  redis:
    image: redis:7
    ports:
      - "6379:6379"

 