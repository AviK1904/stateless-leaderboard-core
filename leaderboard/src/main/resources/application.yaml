spring:
  application:
    name: leaderboard

  datasource:
    url: jdbc:postgresql://localhost:5433/leaderboard
    username: user
    password: password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # --- NEW REDIS SETTINGS ---
  data:
    redis:
      host: localhost
      port: 6379