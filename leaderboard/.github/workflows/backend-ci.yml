name: Spring Boot CI Pipeline

# 1. When should this robot wake up?
on:
  push:
    branches: [ "main", "master" ] # Runs when you push to main
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    # 2. What kind of computer should the robot use?
    runs-on: ubuntu-latest

    steps:
      # 3. Download your code from GitHub
      - name: Checkout Code
        uses: actions/checkout@v4

      # 4. Install Java 17 (or change to 21 if you are using Java 21)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # 5. Build the app and run the tests!
      - name: Build with Maven
        run: mvn clean package